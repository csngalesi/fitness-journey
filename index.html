<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitness Journey MED</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;900&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- App Header -->
    <header class="app-header">
        <div class="user-greeting">
            <div class="avatar">C</div>
            <div class="greeting-text">
                <span>Bom dia,</span>
                <h2>Christiano</h2>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn-icon"><i class="fa-solid fa-fire"></i></button>
            <button class="btn-icon"><i class="fa-solid fa-sliders"></i></button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="app-main" id="main-view">

        <!-- SECTION: Nutrition Summary -->
        <section class="dashboard-section">
            <div class="section-header">
                <h3>Nutrição <span class="badge badge-primary">Bulking</span></h3>
                <button class="btn-link">Diário <i class="fa-solid fa-chevron-right"></i></button>
            </div>

            <div class="card nutrition-card">
                <div class="calories-ring">
                    <svg viewBox="0 0 100 100">
                        <circle class="ring-bg" cx="50" cy="50" r="45"></circle>
                        <circle class="ring-progress" cx="50" cy="50" r="45"
                            style="stroke-dasharray: 282; stroke-dashoffset: 100;"></circle>
                    </svg>
                    <div class="ring-content">
                        <span class="cals-number">1.250</span>
                        <span class="cals-label">Restantes</span>
                    </div>
                </div>

                <div class="macros-breakdown">
                    <div class="macro-item pro">
                        <div class="macro-header">
                            <span>Proteína</span>
                            <span>120 / 180g</span>
                        </div>
                        <div class="progress-bar">
                            <div class="fill" style="width: 66%"></div>
                        </div>
                    </div>
                    <div class="macro-item carb">
                        <div class="macro-header">
                            <span>Carbo</span>
                            <span>200 / 350g</span>
                        </div>
                        <div class="progress-bar">
                            <div class="fill" style="width: 57%"></div>
                        </div>
                    </div>
                    <div class="macro-item fat">
                        <div class="macro-header">
                            <span>Gordura</span>
                            <span>40 / 70g</span>
                        </div>
                        <div class="progress-bar">
                            <div class="fill" style="width: 57%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <button class="btn btn-primary btn-block mt-3">
                <i class="fa-solid fa-utensils"></i> Registrar Refeição
            </button>
        </section>

        <!-- SECTION: Workout Status -->
        <section class="dashboard-section mt-5">
            <div class="section-header">
                <h3>Treino de Hoje</h3>
            </div>

            <div class="card workout-card">
                <div class="workout-icon">
                    <i class="fa-solid fa-dumbbell"></i>
                </div>
                <div class="workout-info">
                    <h4>Treino A - Peito & Tríceps</h4>
                    <p>Última vez: Há 4 dias</p>
                </div>
                <button class="btn-icon play-btn"><i class="fa-solid fa-play"></i></button>
            </div>
        </section>

        <!-- SECTION: Quick Actions (Survival Guide) -->
        <section class="dashboard-section mt-5">
            <h3 class="mb-3">Ações Rápidas</h3>
            <div class="action-grid">
                <button class="action-card survival">
                    <i class="fa-solid fa-person-running"></i>
                    <span>Survival Guide</span>
                </button>
                <button class="action-card cardio">
                    <i class="fa-solid fa-heart-pulse"></i>
                    <span>Cardio (LISS)</span>
                </button>
                <button class="action-card photo">
                    <i class="fa-solid fa-camera"></i>
                    <span>Evolução</span>
                </button>
                <button class="action-card learn">
                    <i class="fa-solid fa-book-open"></i>
                    <span>Educação</span>
                </button>
            </div>
        </section>

    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <i class="fa-solid fa-house"></i>
            <span>Início</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-list"></i>
            <span>Treino</span>
        </a>
        <a href="#" class="nav-item primary-action">
            <div class="fab">
                <i class="fa-solid fa-plus"></i>
            </div>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-apple-whole"></i>
            <span>Dieta</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-user"></i>
            <span>Perfil</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="js/app.js"></script>

</body>

</html>
